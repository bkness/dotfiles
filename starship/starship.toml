# ╔══════════════════════════════════════════╗
# ║  DEVFORGE // STARSHIP NEON COCKPIT       ║
# ║  palette: matrix-green + lang accents    ║
# ╚══════════════════════════════════════════╝

"$schema" = 'https://starship.rs/config-schema.json'

# ── top-level format ──────────────────────────────────────────────────────────
format = """
[╭─](fg:#1a3a22)\
$username\
$os\
$directory\
$git_branch\
$git_status\
$rust\
$golang\
$python\
$nodejs\
$cmd_duration\
$fill\
$time\
[─╮](fg:#1a3a22)
[╰─](fg:#1a3a22)\
$character\
"""

right_format = ""
add_newline = true

palette = "devforge"

# ── palettes ──────────────────────────────────────────────────────────────────
[palettes.devforge]
bg       = "#030a06"
green    = "#00ff41"
green2   = "#00cc33"
muted    = "#4a7a55"
border   = "#1a3a22"
go       = "#00ADD8"
rust     = "#FF4500"
python   = "#FFD43B"
node     = "#68A063"
error    = "#ff4500"
warn     = "#FFD43B"
white    = "#c8ffd4"
dim      = "#2a4a32"

# ── username ──────────────────────────────────────────────────────────────────
[username]
show_always = true
format      = "[bkness](fg:go bold)[@forged](fg:muted bold) "

# ── os icon ───────────────────────────────────────────────────────────────────
[os]
disabled = false
format   = "[$symbol](fg:muted)[ ](fg:border)"

[os.symbols]
Macos   = "󰀵"
Linux   = ""
Windows = "󰍲"

# ── directory ─────────────────────────────────────────────────────────────────
[directory]
format            = "[](fg:border)[ $path ](fg:green bold)[](fg:border) "
truncation_length = 3
truncate_to_repo  = true
style             = "fg:green bold"

[directory.substitutions]
"~"   = "󰋜 ~"
"dev" = "󰲋 dev"

# ── git branch ────────────────────────────────────────────────────────────────
[git_branch]
format = "[](fg:border)[ $symbol$branch ](fg:go)[](fg:border) "
symbol = " "
style  = "fg:go"

# ── git status ────────────────────────────────────────────────────────────────
[git_status]
format   = "[$all_status$ahead_behind](fg:warn) "
modified  = "✦"
staged    = "●"
untracked = "?"
deleted   = "✖"
renamed   = "»"
ahead     = "⇡$count"
behind    = "⇣$count"
diverged  = "⇕⇡$ahead_count⇣$behind_count"
style     = "fg:warn"

# ── language: rust ────────────────────────────────────────────────────────────
[rust]
format = "[](fg:border)[ $symbol$version ](fg:rust bold)[](fg:border) "
symbol = "⚙ "
style  = "fg:rust"

# ── language: go ──────────────────────────────────────────────────────────────
[golang]
format = "[](fg:border)[ $symbol$version ](fg:go bold)[](fg:border) "
symbol = "🐹 "
style  = "fg:go"

# ── language: python ──────────────────────────────────────────────────────────
[python]
format = "[](fg:border)[ $symbol$version ](fg:python bold)[](fg:border) "
symbol = "🐍 "
style  = "fg:python"

# ── language: node ────────────────────────────────────────────────────────────
[nodejs]
format = "[](fg:border)[ $symbol$version ](fg:node bold)[](fg:border) "
symbol = " "
style  = "fg:node"

# ── cmd duration ──────────────────────────────────────────────────────────────
[cmd_duration]
format            = "[ 󱦟 $duration ](fg:muted)"
min_time          = 1000
show_milliseconds = false

# ── fill ──────────────────────────────────────────────────────────────────────
[fill]
symbol = "─"
style  = "fg:border"

# ── time ──────────────────────────────────────────────────────────────────────
[time]
disabled    = false
format      = "[ $time ](fg:muted)"
time_format = "%H:%M"
use_12hr    = false

# ── character (prompt symbol) ─────────────────────────────────────────────────
[character]
success_symbol = "[❯](fg:green bold)"
error_symbol   = "[❯](fg:error bold)"
vimcmd_symbol  = "[❮](fg:go bold)"
